services:

  backend:
    build:
      dockerfile: Dockerfile
      context: ./
    ports:
      - "8080:8080"
    container_name: nebula-backend
    hostname: nebula-backend
    restart: always

  postgres:
    image: postgres:latest
    container_name: nebula-postgres
    hostname: nebula-postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=teste
      - POSTGRES_USERNAME=teste
      - POSTGRES_DB=nebulaforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql


volumes:
  postgres-data: